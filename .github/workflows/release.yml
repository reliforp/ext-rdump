name: release

# On a v* tag: verify the version metadata is in sync, build and test, build a
# package tarball (via `pecl package`, validating package.xml on the way), and
# attach it to the GitHub Release as a convenience source archive. Distribution
# is via PIE/Packagist (PIE installs straight from the tagged source); the
# tarball is just an alternative for `pecl install ./rdump-X.Y.Z.tgz` from a
# checkout-free download. There is no upload to pecl.php.net (deprecated).
#
# workflow_dispatch is offered for a dry run (validate + build + test + package,
# minus the Release upload); it requires being dispatched from a v* tag so the
# version check has a tag to compare against.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build release tarball for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Require a v* tag ref
        run: |
          if [ "$GITHUB_REF_TYPE" != "tag" ] || ! printf '%s' "$GITHUB_REF_NAME" | grep -Eq '^v[0-9]'; then
            echo "::error::run this workflow from a v* tag (got ref_type=$GITHUB_REF_TYPE ref=$GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Set up PHP with pecl/pear and composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: pecl, composer

      - name: Check version metadata is in sync with the tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          hdr="$(sed -n 's/^#define PHP_RDUMP_VERSION "\(.*\)"/\1/p' php_rdump.h)"
          rel="$(sed -n 's:.*<release>\(.*\)</release>.*:\1:p' package.xml | head -1)"
          api="$(sed -n 's:.*<api>\(.*\)</api>.*:\1:p' package.xml | head -1)"
          echo "tag=$tag  php_rdump.h=$hdr  package.xml release=$rel api=$api"
          if [ "$tag" != "$hdr" ] || [ "$tag" != "$rel" ] || [ "$tag" != "$api" ]; then
            echo "::error::version mismatch (tag=$tag header=$hdr release=$rel api=$api)"
            exit 1
          fi

      - name: Validate package.xml (PECL build helper)
        run: pecl package-validate

      - name: Validate composer.json (PIE / Packagist manifest)
        # PIE and Packagist read composer.json, so it gates the actual
        # distribution channel. --strict also fails on warnings.
        run: composer validate --strict --no-check-publish

      - name: Build and run the full CI test suite
        # Reuse the same script the build matrix uses: it runs the phpt suite
        # (when run-tests.php is available) plus the OOM-hook / safe_read /
        # marker / budget smoke gates, so the release is held to the same bar.
        run: |
          docker run --rm \
            -e CI=1 \
            -v "$PWD":/ext -w /ext \
            php:8.3-cli \
            sh ci/build-and-test.sh

      - name: Build the package tarball
        run: |
          pecl package
          ls -l ./*.tgz

      - name: Install from the tarball as a smoke test
        run: |
          sudo pecl install ./rdump-*.tgz
          php -d extension=rdump -m | grep -qi '^rdump$' && echo "loads OK"

      - name: Attach the tarball to the GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ./rdump-*.tgz
          generate_release_notes: true
